name: publish-apt-only

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without v prefix (example: 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-apt:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
      REPOSITORY: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install repo tooling
        run: |
          sudo apt update
          sudo apt install -y apt-utils dpkg-dev gnupg jq

      - name: Download .deb assets from release
        id: download_release_debs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          release_json=""
          for tag in "v${VERSION}" "${VERSION}"; do
            url="https://api.github.com/repos/${REPOSITORY}/releases/tags/${tag}"
            if release_json="$(curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "$url")"; then
              echo "Resolved release tag: ${tag}"
              break
            fi
          done

          if [[ -z "${release_json}" ]]; then
            echo "Release not found for VERSION=${VERSION}; falling back to local .deb build."
            echo "release_found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          amd64_url="$(jq -r --arg v "${VERSION}" '.assets[] | select(.name | test("^api-tester_" + $v + "(_linux)?_(amd64|x86_64)\\.deb$")) | .browser_download_url' <<<"${release_json}" | head -n1)"
          arm64_url="$(jq -r --arg v "${VERSION}" '.assets[] | select(.name | test("^api-tester_" + $v + "(_linux)?_(arm64|aarch64)\\.deb$")) | .browser_download_url' <<<"${release_json}" | head -n1)"

          if [[ -z "${amd64_url}" || -z "${arm64_url}" ]]; then
            echo "Release found, but matching .deb assets were not found; falling back to local .deb build."
            echo "Available release assets:"
            jq -r '.assets[].name' <<<"${release_json}"
            echo "release_found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          curl -fsSL "${amd64_url}" -o "dist/api-tester_${VERSION}_amd64.deb"
          curl -fsSL "${arm64_url}" -o "dist/api-tester_${VERSION}_arm64.deb"
          echo "release_found=true" >> "$GITHUB_OUTPUT"

      - name: Set up Go for local package build fallback
        if: steps.download_release_debs.outputs.release_found != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build .deb artifacts locally (fallback)
        if: steps.download_release_debs.outputs.release_found != 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          workdir: WebSecurity/Reconnaissance/api-tester
          args: release --clean --snapshot --skip=publish --skip=announce --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize fallback .deb filenames
        if: steps.download_release_debs.outputs.release_found != 'true'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p dist

          copied=0
          for deb in WebSecurity/Reconnaissance/api-tester/dist/*.deb; do
            base="$(basename "$deb")"
            arch=""
            if [[ "$base" =~ _(amd64|x86_64)\.deb$ ]]; then
              arch="amd64"
            elif [[ "$base" =~ _(arm64|aarch64)\.deb$ ]]; then
              arch="arm64"
            fi

            if [[ -n "$arch" ]]; then
              cp "$deb" "dist/api-tester_${VERSION}_${arch}.deb"
              copied=$((copied + 1))
            fi
          done

          if [[ "$copied" -lt 2 ]]; then
            echo "Unable to prepare both amd64 and arm64 .deb files from fallback build."
            ls -la WebSecurity/Reconnaissance/api-tester/dist || true
            exit 1
          fi

      - name: Build apt repository files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p apt/pool/main/a/api-tester
          cp dist/api-tester_"${VERSION}"_*.deb apt/pool/main/a/api-tester/

          mkdir -p apt/dists/stable/main/binary-amd64
          mkdir -p apt/dists/stable/main/binary-arm64

          dpkg-scanpackages --arch amd64 apt/pool > apt/dists/stable/main/binary-amd64/Packages
          gzip -kf apt/dists/stable/main/binary-amd64/Packages

          dpkg-scanpackages --arch arm64 apt/pool > apt/dists/stable/main/binary-arm64/Packages
          gzip -kf apt/dists/stable/main/binary-arm64/Packages

          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin="api-tester" \
            -o APT::FTPArchive::Release::Label="api-tester" \
            -o APT::FTPArchive::Release::Suite="stable" \
            -o APT::FTPArchive::Release::Codename="stable" \
            -o APT::FTPArchive::Release::Architectures="amd64 arm64" \
            -o APT::FTPArchive::Release::Components="main" \
            -o APT::FTPArchive::Release::Description="api-tester APT repository" \
            release apt/dists/stable > apt/dists/stable/Release

      - name: Import signing key and sign release metadata
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${APT_GPG_PRIVATE_KEY:-}" ]]; then
            echo "APT_GPG_PRIVATE_KEY is not set; skipping signing."
            echo "Repository will be published unsigned."
            exit 0
          fi

          export GNUPGHOME="$(mktemp -d)"
          trap 'rm -rf "$GNUPGHOME"' EXIT

          echo "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
          KEY_ID="$(gpg --list-secret-keys --keyid-format=long | awk '/sec/{print $2}' | awk -F'/' '{print $2}' | head -n1)"

          if [[ -z "$KEY_ID" ]]; then
            echo "Unable to resolve GPG key ID"
            exit 1
          fi

          if [[ -n "${APT_GPG_PASSPHRASE:-}" ]]; then
            gpg --batch --yes --pinentry-mode loopback --passphrase "$APT_GPG_PASSPHRASE" -u "$KEY_ID" -abs -o apt/dists/stable/Release.gpg apt/dists/stable/Release
            gpg --batch --yes --pinentry-mode loopback --passphrase "$APT_GPG_PASSPHRASE" -u "$KEY_ID" --clearsign -o apt/dists/stable/InRelease apt/dists/stable/Release
          else
            gpg --batch --yes -u "$KEY_ID" -abs -o apt/dists/stable/Release.gpg apt/dists/stable/Release
            gpg --batch --yes -u "$KEY_ID" --clearsign -o apt/dists/stable/InRelease apt/dists/stable/Release
          fi

          gpg --batch --yes --output apt/public.key --armor --export "$KEY_ID"

      - name: Publish apt repo to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: apt
          destination_dir: apt
          keep_files: true
