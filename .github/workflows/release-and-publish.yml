name: release-and-publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish-apt:
    runs-on: ubuntu-latest
    needs: goreleaser
    if: github.ref_type == 'tag'
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Install repo tooling
        run: |
          sudo apt update
          sudo apt install -y apt-utils dpkg-dev gnupg

      - name: Build apt repository files
        env:
          VERSION: ${{ needs.goreleaser.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p apt/pool/main/a/api-tester
          cp dist/api-tester_"${VERSION}"_*.deb apt/pool/main/a/api-tester/

          mkdir -p apt/dists/stable/main/binary-amd64
          mkdir -p apt/dists/stable/main/binary-arm64

          dpkg-scanpackages --arch amd64 apt/pool > apt/dists/stable/main/binary-amd64/Packages
          gzip -kf apt/dists/stable/main/binary-amd64/Packages

          dpkg-scanpackages --arch arm64 apt/pool > apt/dists/stable/main/binary-arm64/Packages
          gzip -kf apt/dists/stable/main/binary-arm64/Packages

          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin="api-tester" \
            -o APT::FTPArchive::Release::Label="api-tester" \
            -o APT::FTPArchive::Release::Suite="stable" \
            -o APT::FTPArchive::Release::Codename="stable" \
            -o APT::FTPArchive::Release::Architectures="amd64 arm64" \
            -o APT::FTPArchive::Release::Components="main" \
            -o APT::FTPArchive::Release::Description="api-tester APT repository" \
            release apt/dists/stable > apt/dists/stable/Release

      - name: Import signing key and sign release metadata
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${APT_GPG_PRIVATE_KEY:-}" ]]; then
            echo "APT_GPG_PRIVATE_KEY secret is required"
            exit 1
          fi

          export GNUPGHOME="$(mktemp -d)"
          trap 'rm -rf "$GNUPGHOME"' EXIT

          echo "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
          KEY_ID="$(gpg --list-secret-keys --keyid-format=long | awk '/sec/{print $2}' | awk -F'/' '{print $2}' | head -n1)"

          if [[ -z "$KEY_ID" ]]; then
            echo "Unable to resolve GPG key ID"
            exit 1
          fi

          if [[ -n "${APT_GPG_PASSPHRASE:-}" ]]; then
            gpg --batch --yes --pinentry-mode loopback --passphrase "$APT_GPG_PASSPHRASE" -u "$KEY_ID" -abs -o apt/dists/stable/Release.gpg apt/dists/stable/Release
            gpg --batch --yes --pinentry-mode loopback --passphrase "$APT_GPG_PASSPHRASE" -u "$KEY_ID" --clearsign -o apt/dists/stable/InRelease apt/dists/stable/Release
          else
            gpg --batch --yes -u "$KEY_ID" -abs -o apt/dists/stable/Release.gpg apt/dists/stable/Release
            gpg --batch --yes -u "$KEY_ID" --clearsign -o apt/dists/stable/InRelease apt/dists/stable/Release
          fi

          gpg --batch --yes --output apt/public.key --armor --export "$KEY_ID"

      - name: Publish apt repo to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: apt
          destination_dir: apt
          keep_files: true

  publish-winget:
    runs-on: windows-latest
    needs: goreleaser
    if: github.ref_type == 'tag'
    steps:
      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install wingetcreate
        shell: pwsh
        run: dotnet tool install --global Microsoft.WingetCreateCLI

      - name: Submit WinGet manifest update
        shell: pwsh
        env:
          VERSION: ${{ needs.goreleaser.outputs.version }}
          REPOSITORY: ${{ github.repository }}
          PACKAGE_IDENTIFIER: ${{ vars.WINGET_PACKAGE_IDENTIFIER || 'leedale1981.api-tester' }}
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINGET_TOKEN)) {
              throw "Secret WINGET_TOKEN is required"
          }

          $zipUrl = "https://github.com/$env:REPOSITORY/releases/download/v$env:VERSION/api-tester_${env:VERSION}_windows_amd64.zip"
          $env:PATH = "$env:USERPROFILE\\.dotnet\\tools;$env:PATH"

          wingetcreate update $env:PACKAGE_IDENTIFIER --version $env:VERSION --urls $zipUrl --token $env:WINGET_TOKEN --submit
